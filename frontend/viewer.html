<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Viewer — Liberix</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- USER LOAN LOOKUP -->
<div class="user-overlay show" id="userOverlay">
  <div class="user-container">
    <div class="user-topbar">
      <div class="user-topbar-brand">
        <div class="logo-letter sm">L</div>
        <div class="user-topbar-label"><span>Liber</span>ix</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div id="userPriceStatus" class="price-status-text"></div>
        <div class="user-topbar-badge">User View</div>
        <a href="/" class="user-back-btn">&larr; Back</a>
      </div>
    </div>
    <div class="user-lookup-box" id="userLookupBox">
      <div class="user-lookup-title">Look Up Your Loan</div>
      <div class="user-lookup-sub">Enter your Loan ID to view loan details</div>
      <div class="user-lookup-input-wrap">
        <input class="user-lookup-input" id="userLoanInput" type="text" placeholder="Enter Loan ID (e.g. OEL-2026-001)" onkeydown="if(event.key==='Enter')userLookupLoan()">
        <button class="user-lookup-btn" onclick="userLookupLoan()">Search</button>
      </div>
      <div class="user-lookup-error" id="userLookupError"></div>
    </div>
    <div class="user-loan-result" id="userLoanResult">
      <div style="margin-bottom:16px;"><button class="user-back-btn" onclick="clearLoanResult()">&larr; Search Another Loan</button></div>
      <div class="user-loan-card" id="userLoanCard"></div>
    </div>
  </div>
</div>

<script src="/js/shared.js"></script>
<script src="/js/viewer.js"></script>
</body>
</html>
