services:
  app:
    image: ${GHCR_IMAGE}
    container_name: liberix-monitor-app
    restart: unless-stopped
    env_file: .env
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: 3000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/prices || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - monitor_internal
      - web
      - db

  # ── Cron: fetch Bitkub order books every minute ───────────────────────────
  orderbook-cron:
    image: curlimages/curl:latest
    container_name: liberix-monitor-cron
    restart: unless-stopped
    env_file: .env
    command: >
      sh -c "while true;
             do curl -s 'http://liberix-monitor-app:3000/api/cron/orderbook-fetch?secret=$$CRON_SECRET';
             echo '';
             sleep 60;
             done"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - monitor_internal

networks:
  monitor_internal:
    driver: bridge
  web:
    external: true
    name: app_app-net
  db:
    external: true
    name: infra_db-net
